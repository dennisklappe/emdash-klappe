name: Auto Repro (Experimental)

# Phase 2 of the Flue triage experiment.
#
# When a maintainer applies the `triage:reproduce` label to an issue,
# this workflow checks out the repo, installs dependencies, and runs
# `flue run repro-issue` with the issue's content as the payload.
#
# The agent uses a local sandbox (real bash) and is expected to:
#   - try to reproduce the bug as a failing vitest test or repro script
#   - post a single comment back to the issue summarising what happened
#   - apply one of `reproduced` / `not-reproduced` / `repro-skipped`
#
# It does NOT push branches, commit anything, or attempt fixes.
#
# Triggers only on `labeled` with the specific label, so it never fires
# on every issue. Costs are bounded: one Opus run per manual invocation.

on:
  issues:
    types: [labeled]

# One repro attempt per issue at a time; new ones queue.
concurrency:
  group: auto-repro-${{ github.event.issue.number }}
  cancel-in-progress: false

# Default-deny at workflow scope. Per-job permissions narrow further --
# the repro job grants the runner's GITHUB_TOKEN only what the agent's
# bash legitimately needs (issues: read for `gh issue view`,
# contents: read for the checkout). All issue writes (comment, label)
# happen with a separate app-token that the agent's bash never sees.
permissions:
  contents: read

jobs:
  repro:
    if: >-
      github.event.label.name == 'triage:reproduce' &&
      !github.event.issue.pull_request
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      issues: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Mint a separate app-token for orchestrator-only operations
      # (posting the result comment, applying the result label,
      # precreating the three result labels). The agent's bash never
      # sees this token -- it stays in the workflow / TS orchestrator
      # env, not in the local() sandbox's env. Even a complete agent
      # jailbreak can't escalate to comment/label writes.
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Setup PNPM
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Install Flue CLI
        run: |
          cd .flue
          pnpm install --frozen-lockfile

      - name: Ensure result labels exist
        env:
          # Label creation requires write; use the app token so the
          # default GITHUB_TOKEN can stay read-only.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # The agent applies one of these labels after the reproduction
          # attempt. `gh label create --force` is idempotent: it creates the
          # label if missing, updates colour/description if present.
          gh label create reproduced --color "0e8a16" --description "Bug reproduced by an automated attempt" --force
          gh label create not-reproduced --color "fbca04" --description "Automated reproduction attempt could not observe the reported behaviour" --force
          gh label create repro-skipped --color "c5def5" --description "Automated reproduction was not attempted (host-specific, requires user data, etc.)" --force

      - name: Run repro agent
        env:
          # Read-only token the agent's bash inherits via local({ env: { GH_TOKEN } }).
          # Permits: `gh issue view`, `git clone`, repo reads. Cannot
          # comment, label, or close anything.
          AGENT_GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Privileged token the orchestrator uses for the result comment
          # and result label. This MUST NOT be exposed to local({ env }):
          # see agents/repro-issue.ts where only AGENT_GH_TOKEN is passed
          # through, and ORCHESTRATOR_GH_TOKEN stays in process.env for
          # the TS code's use only.
          ORCHESTRATOR_GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CLOUDFLARE_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_NAME }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Build the payload from the workflow event. Use jq to escape
          # title/body cleanly (they may contain quotes, backticks, etc.).
          PAYLOAD=$(jq -nc \
            --argjson n "$ISSUE_NUMBER" \
            --arg t "$ISSUE_TITLE" \
            --arg b "$ISSUE_BODY" \
            '{issueNumber: $n, issueTitle: $t, issueBody: $b, owner: "emdash-cms", repo: "emdash"}')
          cd .flue
          pnpm exec flue run repro-issue \
            --target node \
            --id "repro-${ISSUE_NUMBER}-$(date +%s)" \
            --payload "$PAYLOAD"
